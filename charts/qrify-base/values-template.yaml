# App configuration
name: "" # Name of the application 
environment: "" # Environment (e.g. dev, prod)
imageTag: "" 
deployment: true # Set to false to disable deployment
replicaCount: 2 # Number of replicas (ignored when autoscaling.enabled)

# Horizontal Pod Autoscaler (requires metrics-server + CPU requests)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

image:
  repository: ""  # Optional override for the image repository
  pullPolicy: IfNotPresent # Image pull policy (e.g. Always, IfNotPresent, Never)

# Environment variables
env: []
# Example:
# - name: NEXT_PUBLIC_API_BASE_URL
#   value: "https://api.qrify.com"

# Optional secrets mounted via envFrom
envSecrets: []

# Service account (set annotations.eks.amazonaws.com/role-arn for IRSA)
serviceAccount:
  create: false
  name: ""
  annotations: {}

# Service configuration
service:
  type: ClusterIP # Service type (e.g. ClusterIP, NodePort, LoadBalancer)
  port: 80 # Service port

# Ingress configuration
ingress:
  enabled: false
  className: ""  # e.g. "nginx"
  annotations: {}
  # Example:
  #   kubernetes.io/ingress.class: "nginx"
  hosts: []
  # Example:
  #   - host: qrify-web.yourdomain.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  tls: []
  # Example:
  #   - secretName: qrify-web-tls
  #     hosts:
  #       - qrify-web.yourdomain.com

# Kubernetes resource limits (CPU requests required for HPA)
resources: {}
# Example:
# requests:
#   cpu: "100m"
#   memory: "128Mi"
# limits:
#   memory: "256Mi"


# Probes (optional) 
livenessProbe: {}
readinessProbe: {}
